<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="一款與 AI 對戰的五子棋遊戲，支持多個難度等級">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="五子棋">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='96' y='120' font-size='100' text-anchor='middle' fill='white' font-weight='bold'>五</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180' rx='40'/><text x='90' y='130' font-size='100' text-anchor='middle' fill='white' font-weight='bold'>五</text></svg>">
    <title>五子棋遊戲 - AI對手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 30%), linear-gradient(135deg, #1f2b71 0%, #6237a0 55%, #2a91d1 100%);
            padding: 20px;
            color: #222;
        }

        .container {
            text-align: center;
            width: min(100%, 1024px);
            padding: 0 12px;
        }

        h1 {
            color: white;
            margin-bottom: 6px;
            font-size: 2.5em;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.35);
        }

        .app-subtitle {
            color: rgba(255,255,255,0.88);
            font-size: 1rem;
            margin-top: 6px;
            letter-spacing: 0.02em;
        }

        .app-header {
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:12px;
            margin-bottom:14px;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .meta-chip {
            background: rgba(255,255,255,0.18);
            color: white;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.95em;
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin: 20px auto 10px;
            max-width: 980px;
        }

        .feature-card {
            background: rgba(255,255,255,0.92);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
            min-height: 120px;
        }

        .feature-card h2 {
            margin-bottom: 8px;
            font-size: 1.1em;
            color: #222;
        }

        .feature-card p {
            color: #444;
            line-height: 1.6;
            font-size: 0.98em;
        }

        .game-board-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 22px;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.22);
            display: inline-block;
            margin-bottom: 18px;
        }

        .install-btn{
            background: rgba(255,255,255,0.12);
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            padding:8px 12px;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
        }

        .game-info {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .game-info p {
            margin: 8px 0;
            font-size: 1.1em;
            color: #333;
        }

        .status {
            font-weight: bold;
            color: #667eea;
            font-size: 1.3em;
        }

        .game-board-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: inline-block;
        }

        #gameBoard {
            display: inline-grid;
            grid-template-columns: repeat(15, 30px);
            grid-gap: 0;
            background: linear-gradient(#d4a574,#d4a574);
            border-radius:8px;
            padding: 8px;
            box-shadow: inset 0 0 0 2px #8b6f47;
            /* draw grid lines */
            background-image:
                linear-gradient(to right, rgba(140,100,60,0.7) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(140,100,60,0.7) 1px, transparent 1px);
            background-size: calc((100% - 16px)/15) calc((100% - 16px)/15);
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #e8d7c3;
            border: 1px solid #9c8b7e;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .cell:hover {
            background: #f0e0d0;
        }

        .cell.player-move::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 35% 30%, #666 0%, #111 40%, #000 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.45);
            transition: transform 120ms ease;
        }

        .cell.ai-move::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 35% 30%, #fff 0%, #ddd 60%, #bbb 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #333;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Mobile touch targets */
        @media (max-width: 700px) {
            #gameBoard { grid-template-columns: repeat(15, 44px); }
            .cell { width: 44px; height: 44px; }
            .cell.player-move::after, .cell.ai-move::after { width: 34px; height: 34px; }
        }

        .controls {
            margin-top: 20px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }


        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            min-height: 20px;
        }

        .message.win {
            background: #4caf50;
            color: white;
            font-size: 1.2em;
        }

        .message.lose {
            background: #f44336;
            color: white;
            font-size: 1.2em;
        }

        .message.thinking {
            background: #ff9800;
            color: white;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1>🎮 五子棋遊戲</h1>
            <button id="installBtn" class="install-btn" style="display:none">安裝 App</button>
        </div>
        
        <div class="game-info">
            <p>你是 <span style="color: #333; font-weight: bold;">● 黑棋</span> | AI 是 <span style="color: #999; font-weight: bold;">○ 白棋</span></p>
            <p class="status" id="status">你的回合</p>
            <p>黑子數: <span id="blackCount">0</span> | 白子數: <span id="whiteCount">0</span></p>
        </div>

        <div class="game-meta">
            <span class="meta-chip">難度：最困難</span>
            <span class="meta-chip">快速落子保護</span>
            <span class="meta-chip">離線可玩</span>
        </div>

        <div class="feature-grid">
            <div class="feature-card">
                <h2>遊戲特色</h2>
                <p>AI 採用多層搜尋、威脅偵測與開路封鎖，保持最高挑戰難度。</p>
            </div>
            <div class="feature-card">
                <h2>玩法提示</h2>
                <p>優先佔據中心與連線關鍵位置，讓 AI 也難以輕易取勝。</p>
            </div>
            <div class="feature-card">
                <h2>操作優化</h2>
                <p>快速連點已鎖定，落子完成前無法重複操作，避免誤觸失誤。</p>
            </div>
        </div>

        <div class="game-board-container">
            <div id="gameBoard"></div>
        </div>

        <div class="controls">
            <button onclick="resetGame()">🔄 重新開始</button>
            <button onclick="undoMove()">↶ 悔棋</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const BOARD_SIZE = 15;
        const PLAYER = 1;
        const AI = 2;
        const EMPTY = 0;

        let board = [];
        let gameOver = false;
        let moveHistory = [];
        let inputLocked = false;
        const difficulty = 'hard';

        // Transposition table (Zobrist hashing)
        const zobrist = [];
        let zobristInit = false;
        const TRANSPOSITION = new Map(); // key: hash|depth -> {value}

        function initZobrist() {
            if (zobristInit) return;
            const rnd = () => Math.floor(Math.random() * 0xFFFFFFFF);
            for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
                zobrist[i] = [rnd(), rnd(), rnd()]; // index: EMPTY, PLAYER, AI
            }
            zobristInit = true;
        }

        function computeHash() {
            let h = 0;
            for (let i = 0; i < board.length; i++) {
                const v = board[i];
                if (v !== EMPTY) {
                    h ^= zobrist[i][v];
                }
            }
            return h >>> 0;
        }

        function initBoard() {
            board = Array(BOARD_SIZE * BOARD_SIZE).fill(EMPTY);
            gameOver = false;
            moveHistory = [];
            updateUI();
            clearMessage();
        }

        function resetGame() {
            inputLocked = false;
            initBoard();
            renderBoard();
        }

        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                
                if (board[i] === PLAYER) {
                    cell.classList.add('player-move');
                } else if (board[i] === AI) {
                    cell.classList.add('ai-move');
                }
                
                // 使用 pointerdown 支援觸控/滑鼠/筆，並避免 300ms 延遲
                cell.addEventListener('pointerdown', (e) => { e.preventDefault(); playerMove(i); }, { passive: false });
                // fallback for older touch-only browsers
                cell.addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(i); }, { passive: false });
                // prevent context menu on long press
                cell.addEventListener('contextmenu', (e) => e.preventDefault());
                gameBoard.appendChild(cell);
            }
        }

        function playerMove(index) {
            if (gameOver || inputLocked || board[index] !== EMPTY) return;
            inputLocked = true;

            board[index] = PLAYER;
            moveHistory.push({ index, player: PLAYER });

            if (checkWin(PLAYER)) {
                showMessage('🎉 你贏了！', 'win');
                gameOver = true;
                inputLocked = false;
                updateUI();
                renderBoard();
                return;
            }

            updateUI();
            renderBoard();
            setTimeout(aiMove, 500);
        }

        function aiMove() {
            if (gameOver) {
                inputLocked = false;
                return;
            }

            showMessage('AI 正在思考...', 'thinking');

            let bestMove = getHardMove();

            if (bestMove === -1) {
                showMessage('平手！', 'lose');
                gameOver = true;
                inputLocked = false;
                updateUI();
                return;
            }

            board[bestMove] = AI;
            moveHistory.push({ index: bestMove, player: AI });

            if (checkWin(AI)) {
                showMessage('💀 AI 贏了！', 'lose');
                gameOver = true;
                inputLocked = false;
                updateUI();
                renderBoard();
                return;
            }

            updateUI();
            renderBoard();
            clearMessage();
            inputLocked = false;
        }

        function getRandomMove() {
            const candidates = getCandidateMoves();
            if (candidates.length === 0) return -1;
            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function getMediumMove() {
            const win = findWinningMove(AI);
            if (win !== null) return win;
            const block = findBlockingMove(PLAYER);
            if (block !== null) return block;
            const threat = findDoubleThreatMove(PLAYER) || findThreatMove(PLAYER);
            if (threat !== null) return threat;
            const candidates = getCandidateMoves();
            let best = -1, bestScore = -Infinity;
            for (let m of candidates) {
                const score = evaluatePosition(m, AI);
                if (score > bestScore) { bestScore = score; best = m; }
            }
            return best !== -1 ? best : getRandomMove();
        }

        function getHardMove() {
            const candidates = getCandidateMoves();
            if (candidates.length === 0) return -1;
            const win = findWinningMove(AI);
            if (win !== null) return win;
            const block = findBlockingMove(PLAYER);
            if (block !== null) return block;
            const doubleThreat = findDoubleThreatMove(PLAYER);
            if (doubleThreat !== null) return doubleThreat;
            const threat = findThreatMove(PLAYER);
            if (threat !== null) return threat;
            initZobrist();
            const timeLimit = 1000; // ms
            const start = Date.now();
            let best = -1, bestScore = -Infinity;
            let ordered = candidates.map(m => ({m, v: evaluatePosition(m, AI)})).sort((a,b)=>b.v-a.v).map(x=>x.m);
            const maxDepth = Math.min(8, Math.max(2, Math.floor(1200 / Math.max(1, ordered.length))));
            for (let depth = 1; depth <= maxDepth; depth++) {
                if (Date.now() - start > timeLimit) break;
                let localBest = -1, localBestScore = -Infinity;
                for (let m of ordered) {
                    if (Date.now() - start > timeLimit) break;
                    board[m] = AI;
                    const score = -negamax(depth - 1, -Infinity, Infinity, PLAYER);
                    board[m] = EMPTY;
                    if (score > localBestScore) { localBestScore = score; localBest = m; }
                    if (localBestScore > bestScore) { bestScore = localBestScore; best = localBest; }
                }
                if (bestScore >= 100000) break;
                ordered.sort((a,b)=>{
                    const va = evaluatePosition(a, AI);
                    const vb = evaluatePosition(b, AI);
                    return vb - va;
                });
            }
            return best !== -1 ? best : getRandomMove();
        }

        function evaluatePosition(index, player) {
            const MAX = 1000000;
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            let score = 0;
            let highThreats = 0;
            for (let dir of directions) {
                const lineScore = evaluateLineInDirection(index, player, dir);
                if (lineScore >= 5000) highThreats++;
                score += lineScore;
            }
            if (highThreats >= 2) {
                score += 80000; // double threat bonus
            }
            return score;
        }

        function evaluateLineInDirection(index, player, dir) {
            const MAX = 1000000;
            const opponent = player === AI ? PLAYER : AI;
            const cells = [];
            for (let d = -5; d <= 5; d++) {
                const ni = index + d * (dir[0] * BOARD_SIZE + dir[1]);
                if (ni < 0 || ni >= BOARD_SIZE * BOARD_SIZE || !isValidLine(ni, index, dir)) {
                    cells.push('B');
                } else {
                    const v = board[ni];
                    cells.push(v === player ? 'X' : v === EMPTY ? '.' : 'O');
                }
            }
            const line = cells.join('');
            if (/XXXXX/.test(line)) return MAX;
            if (/[\.B]XXXX[\.B]/.test(line)) return 100000;
            if (/[\.B]XXX\.X[\.B]/.test(line) || /[\.B]X\.XXX[\.B]/.test(line) || /[\.B]XX\.XX[\.B]/.test(line)) return 25000;
            if (/[\.B]XXX[\.B]/.test(line)) return 5000;
            if (/[\.B]XX\.X[\.B]/.test(line) || /[\.B]X\.XX[\.B]/.test(line)) return 2000;
            if (/[\.B]XX[\.B]/.test(line)) return 400;
            if (/[\.B]X[\.B]/.test(line)) return 80;
            return 0;
        }

        // Candidate moves: empty cells near existing stones
        function getCandidateMoves() {
            const set = new Set();
            for (let i = 0; i < board.length; i++) {
                if (board[i] !== EMPTY) {
                    const r = Math.floor(i / BOARD_SIZE);
                    const c = i % BOARD_SIZE;
                    for (let dr = -3; dr <= 3; dr++) {
                        for (let dc = -3; dc <= 3; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
                            const idx = nr * BOARD_SIZE + nc;
                            if (board[idx] === EMPTY) set.add(idx);
                        }
                    }
                }
            }
            if (set.size === 0) return [Math.floor(BOARD_SIZE * BOARD_SIZE / 2)];
            return Array.from(set);
        }

        // Negamax with alpha-beta pruning
        function negamax(depth, alpha, beta, player) {
                    if (checkWin(PLAYER)) return -100000;
                    if (checkWin(AI)) return 100000;
                    initZobrist();
                    const h = computeHash();
                    const ttKey = h + '|' + depth + '|' + player;
                    if (TRANSPOSITION.has(ttKey)) {
                        return TRANSPOSITION.get(ttKey);
                    }
            if (depth === 0) {
                let s = 0;
                for (let i=0;i<board.length;i++) if (board[i]===AI) s += evaluatePosition(i, AI);
                for (let i=0;i<board.length;i++) if (board[i]===PLAYER) s -= evaluatePosition(i, PLAYER);
                return s;
            }
            const moves = getCandidateMoves();
            if (moves.length === 0) return 0;
            // move ordering: score moves by heuristic when applied
            const scored = moves.map(m => { board[m] = player; const v = evaluatePosition(m, player); board[m] = EMPTY; return {m, v}; });
            scored.sort((a,b) => b.v - a.v);
            let max = -Infinity;
            for (let item of scored) {
                const m = item.m;
                board[m] = player;
                const val = -negamax(depth-1, -beta, -alpha, player===AI?PLAYER:AI);
                board[m] = EMPTY;
                if (val > max) max = val;
                if (val > alpha) alpha = val;
                if (alpha >= beta) break;
            }
            TRANSPOSITION.set(ttKey, max);
            return max;
        }

        function isValid(index, dir) {
            if (index < 0 || index >= BOARD_SIZE * BOARD_SIZE) return false;
            const row = Math.floor(index / BOARD_SIZE);
            const col = index % BOARD_SIZE;
            if (col === 0 && dir[1] === -1) return false;
            if (col === BOARD_SIZE - 1 && dir[1] === 1) return false;
            if (row === 0 && dir[0] === -1) return false;
            if (row === BOARD_SIZE - 1 && dir[0] === 1) return false;
            return true;
        }

        function findWinningMove(player) {
            for (let i = 0; i < board.length; i++) {
                if (board[i] === EMPTY) {
                    board[i] = player;
                    if (checkWin(player)) {
                        board[i] = EMPTY;
                        return i;
                    }
                    board[i] = EMPTY;
                }
            }
            return null;
        }

        function findBlockingMove(player) {
            return findWinningMove(player);
        }

        function findThreatMove(player) {
            const candidates = getCandidateMoves();
            let best = null;
            let bestScore = -Infinity;
            for (let idx of candidates) {
                board[idx] = player;
                const v = evaluatePosition(idx, player);
                board[idx] = EMPTY;
                if (v > bestScore) {
                    bestScore = v;
                    best = idx;
                }
                if (v >= 100000) {
                    board[idx] = EMPTY;
                    return idx;
                }
            }
            return bestScore >= 5000 ? best : null;
        }

        function countThreats(index, player) {
            let count = 0;
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            for (let dir of directions) {
                const score = evaluateLineInDirection(index, player, dir);
                if (score >= 5000) count++; // open three or better
            }
            return count;
        }

        function findDoubleThreatMove(player) {
            const candidates = getCandidateMoves();
            for (let idx of candidates) {
                board[idx] = player;
                const threats = countThreats(idx, player);
                board[idx] = EMPTY;
                if (threats >= 2) return idx;
            }
            return null;
        }

        function checkWin(player) {
            const directions = [
                [0, 1], [1, 0], [1, 1], [1, -1]
            ];

            for (let i = 0; i < board.length; i++) {
                if (board[i] !== player) continue;

                for (let dir of directions) {
                    let count = 1;
                    for (let j = 1; j < 5; j++) {
                        const newIdx = i + j * (dir[0] * BOARD_SIZE + dir[1]);
                        if (!isValidLine(newIdx, i, dir)) break;
                        if (board[newIdx] === player) count++;
                        else break;
                    }

                    for (let j = 1; j < 5; j++) {
                        const newIdx = i - j * (dir[0] * BOARD_SIZE + dir[1]);
                        if (!isValidLine(newIdx, i, [-dir[0], -dir[1]])) break;
                        if (board[newIdx] === player) count++;
                        else break;
                    }

                    if (count >= 5) return true;
                }
            }
            return false;
        }

        function isValidLine(newIdx, origIdx, dir) {
            if (newIdx < 0 || newIdx >= BOARD_SIZE * BOARD_SIZE) return false;
            const origRow = Math.floor(origIdx / BOARD_SIZE);
            const origCol = origIdx % BOARD_SIZE;
            const newRow = Math.floor(newIdx / BOARD_SIZE);
            const newCol = newIdx % BOARD_SIZE;

            if (dir[0] === 0 && dir[1] !== 0) {
                return newRow === origRow;
            }
            if (dir[1] === 0 && dir[0] !== 0) {
                return newCol === origCol;
            }
            return Math.abs(newRow - origRow) === Math.abs(newCol - origCol);
        }

        function undoMove() {
            if (moveHistory.length < 2) return;
            moveHistory.pop();
            moveHistory.pop();

            board = Array(BOARD_SIZE * BOARD_SIZE).fill(EMPTY);
            for (let move of moveHistory) {
                board[move.index] = move.player;
            }

            gameOver = false;
            updateUI();
            renderBoard();
            clearMessage();
        }

        function updateUI() {
            const blackCount = board.filter(cell => cell === PLAYER).length;
            const whiteCount = board.filter(cell => cell === AI).length;
            document.getElementById('blackCount').textContent = blackCount;
            document.getElementById('whiteCount').textContent = whiteCount;

            if (!gameOver) {
                document.getElementById('status').textContent = moveHistory.length % 2 === 0 ? '你的回合' : 'AI 正在思考...';
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        function clearMessage() {
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }

        resetGame();

        // 註冊 Service Worker 以支持 PWA 功能
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('Service Worker 已註冊');
                    // 若已經有等待中的 SW，要求其立即啟用
                    if (registration.waiting) {
                        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                    registration.addEventListener('updatefound', () => {
                        const newSW = registration.installing;
                        if (newSW) {
                            newSW.addEventListener('statechange', () => {
                                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('新的 Service Worker 已安裝，將在下一個 load 生效');
                                }
                            });
                        }
                    });
                })
                .catch(error => console.log('Service Worker 註冊失敗:', error));

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('Service Worker controller changed — 重新載入');
                window.location.reload();
            });
        }

        // 安裝提示
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 可以在這裡顯示安裝按鈕
            console.log('可以安裝應用程序');
            const btn = document.getElementById('installBtn');
            if (btn) { btn.style.display = 'inline-block'; }
        });

        // 安裝成功
        window.addEventListener('appinstalled', () => {
            console.log('應用程序已安裝');
        });

        // install button handler
        document.getElementById('installBtn')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const choice = await deferredPrompt.userChoice;
            if (choice && choice.outcome === 'accepted') {
                console.log('User accepted the A2HS prompt');
            }
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        });
    </script>
    <style>
        #debugPanel {
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: 320px;
            max-height: 40vh;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            border-radius: 8px;
            overflow: auto;
            z-index: 99999;
            box-shadow: 0 6px 18px rgba(0,0,0,0.5);
        }
        #debugPanel .dbgHeader{font-weight:bold;margin-bottom:6px}
        #debugPanel pre{white-space:pre-wrap;margin:0}
    </style>
    <div id="debugPanel" aria-hidden="false">
        <div class="dbgHeader">Debug</div>
        <pre id="debugLog">(debug panel)</pre>
    </div>
    <script>
    (function(){
        try{
            const pre = document.getElementById('debugLog');
            function append(msg){
                if(!pre) return;
                pre.textContent += '\n' + msg;
                if(pre.textContent.length>20000) pre.textContent = pre.textContent.slice(-10000);
                pre.parentElement.scrollTop = pre.parentElement.scrollHeight;
            }
            const orig = {log: console.log.bind(console), error: console.error.bind(console), warn: console.warn.bind(console)};
            ['log','error','warn'].forEach(fn=>{
                console[fn] = function(...args){
                    try{ append(fn+': '+args.map(a=>{try{return typeof a==='object'?JSON.stringify(a):String(a)}catch(e){return String(a)}}).join(' ')); }catch(e){}
                    orig[fn](...args);
                };
            });
            window.addEventListener('error', e=>{
                append('ERROR: '+(e.message||e)+' at '+(e.filename||'')+':'+(e.lineno||''));
            });
            window.addEventListener('unhandledrejection', e=>{
                append('PromiseReject: '+(e.reason && e.reason.message? e.reason.message : String(e.reason)));
            });
            // expose a safe logger
            window.__mobileDebug = function(s){ append(String(s)); };
            console.log('Mobile debug panel enabled');
        }catch(e){/* silent */}
    })();
    </script>
</body>
