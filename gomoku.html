<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="一款與 AI 對戰的五子棋遊戲，支持多個難度等級">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="五子棋">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='96' y='120' font-size='100' text-anchor='middle' fill='white' font-weight='bold'>五</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23667eea' width='180' height='180' rx='40'/><text x='90' y='130' font-size='100' text-anchor='middle' fill='white' font-weight='bold'>五</text></svg>">
    <title>五子棋遊戲 - AI對手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 30%), linear-gradient(135deg, #1f2b71 0%, #6237a0 55%, #2a91d1 100%);
            padding: 20px;
            color: #222;
        }

        .container {
            text-align: center;
            width: min(100%, 1024px);
            padding: 0 12px;
        }

        h1 {
            color: white;
            margin-bottom: 6px;
            font-size: 2.5em;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.35);
        }

        .app-subtitle {
            color: rgba(255,255,255,0.88);
            font-size: 1rem;
            margin-top: 6px;
            letter-spacing: 0.02em;
        }

        .app-header {
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:12px;
            margin-bottom:14px;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .meta-chip {
            background: rgba(255,255,255,0.18);
            color: white;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.95em;
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin: 20px auto 10px;
            max-width: 980px;
        }

        .feature-card {
            background: rgba(255,255,255,0.92);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
            min-height: 120px;
        }

        .feature-card h2 {
            margin-bottom: 8px;
            font-size: 1.1em;
            color: #222;
        }

        .feature-card p {
            color: #444;
            line-height: 1.6;
            font-size: 0.98em;
        }

        .game-board-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 22px;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.22);
            display: inline-block;
            margin-bottom: 18px;
        }

        .game-info p {
            margin: 8px 0;
            font-size: 1.1em;
            color: #333;
        }

        .status {
            font-weight: bold;
            color: #667eea;
            font-size: 1.3em;
        }

        .game-board-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: inline-block;
        }

        #gameBoard {
            display: inline-grid;
            grid-template-columns: repeat(15, 30px);
            grid-gap: 0;
            background: #d4a574;
            border: 2px solid #8b6f47;
            padding: 5px;
        }

        .cell {
            width: 30px;
            height: 30px;
            background: #e8d7c3;
            border: 1px solid #9c8b7e;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .cell:hover {
            background: #f0e0d0;
        }

        .cell.player-move::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .cell.ai-move::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #333;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        @media (max-width: 700px) {
            #gameBoard { grid-template-columns: repeat(15, 44px); }
            .cell { width: 44px; height: 44px; }
            .cell.player-move::after, .cell.ai-move::after { width: 34px; height: 34px; }
        }

        .controls {
            margin-top: 20px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .game-meta {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .meta-chip {
            background: rgba(255,255,255,0.18);
            color: white;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.95em;
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin: 20px auto 10px;
            max-width: 980px;
        }

        .feature-card {
            background: rgba(255,255,255,0.92);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
            min-height: 120px;
        }

        .feature-card h2 {
            margin-bottom: 8px;
            font-size: 1.1em;
            color: #222;
        }

        .feature-card p {
            color: #444;
            line-height: 1.6;
            font-size: 0.98em;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            min-height: 20px;
        }

        .message.win {
            background: #4caf50;
            color: white;
            font-size: 1.2em;
        }

        .message.lose {
            background: #f44336;
            color: white;
            font-size: 1.2em;
        }

        .message.thinking {
            background: #ff9800;
            color: white;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 五子棋遊戲</h1>
        
        <div class="game-info">
            <p>你是 <span style="color: #333; font-weight: bold;">● 黑棋</span> | AI 是 <span style="color: #999; font-weight: bold;">○ 白棋</span></p>
            <p class="status" id="status">你的回合</p>
            <p>黑子數: <span id="blackCount">0</span> | 白子數: <span id="whiteCount">0</span></p>
        </div>

        <div class="game-meta">
            <span class="meta-chip">難度：最困難</span>
            <span class="meta-chip">快速落子保護</span>
            <span class="meta-chip">離線可玩</span>
        </div>

        <div class="feature-grid">
            <div class="feature-card">
                <h2>遊戲特色</h2>
                <p>AI 採用多層搜尋、威脅偵測與開路封鎖，保持最高挑戰難度。</p>
            </div>
            <div class="feature-card">
                <h2>玩法提示</h2>
                <p>優先佔據中心與連線關鍵位置，讓 AI 也難以輕易取勝。</p>
            </div>
            <div class="feature-card">
                <h2>操作優化</h2>
                <p>快速連點已鎖定，落子完成前無法重複操作，避免誤觸失誤。</p>
            </div>
        </div>

        <div class="game-board-container">
            <div id="gameBoard"></div>
        </div>

        <div class="controls">
            <button onclick="resetGame()">🔄 重新開始</button>
            <button onclick="undoMove()">↶ 悔棋</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const BOARD_SIZE = 15;
        const PLAYER = 1;
        const AI = 2;
        const EMPTY = 0;

        let board = [];
        let gameOver = false;
        let moveHistory = [];
        let inputLocked = false;
        const difficulty = 'hard';

        function initBoard() {
            board = Array(BOARD_SIZE * BOARD_SIZE).fill(EMPTY);
            gameOver = false;
            moveHistory = [];
            updateUI();
            clearMessage();
        }

        function resetGame() {
            inputLocked = false;
            initBoard();
            renderBoard();
        }

        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                
                if (board[i] === PLAYER) {
                    cell.classList.add('player-move');
                } else if (board[i] === AI) {
                    cell.classList.add('ai-move');
                }
                
                cell.addEventListener('pointerdown', (e) => { e.preventDefault(); playerMove(i); }, { passive: false });
                cell.addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(i); }, { passive: false });
                cell.addEventListener('contextmenu', (e) => e.preventDefault());
                gameBoard.appendChild(cell);
            }
        }

        function playerMove(index) {
            if (gameOver || inputLocked || board[index] !== EMPTY) return;
            inputLocked = true;

            board[index] = PLAYER;
            moveHistory.push({ index, player: PLAYER });

            if (checkWin(PLAYER)) {
                showMessage('🎉 你贏了！', 'win');
                gameOver = true;
                inputLocked = false;
                updateUI();
                renderBoard();
                return;
            }

            updateUI();
            renderBoard();
            setTimeout(aiMove, 500);
        }

        function aiMove() {
            if (gameOver) {
                inputLocked = false;
                return;
            }

            showMessage('AI 正在思考...', 'thinking');

            let bestMove = getHardMove();

            if (bestMove === -1) {
                showMessage('平手！', 'lose');
                gameOver = true;
                inputLocked = false;
                updateUI();
                return;
            }

            board[bestMove] = AI;
            moveHistory.push({ index: bestMove, player: AI });

            if (checkWin(AI)) {
                showMessage('💀 AI 贏了！', 'lose');
                gameOver = true;
                inputLocked = false;
                updateUI();
                renderBoard();
                return;
            }

            updateUI();
            renderBoard();
            clearMessage();
            inputLocked = false;
        }

        function getRandomMove() {
            const candidates = getCandidateMoves();
            if (candidates.length === 0) return -1;
            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function getMediumMove() {
            const win = findWinningMove(AI);
            if (win !== null) return win;
            const block = findBlockingMove(PLAYER);
            if (block !== null) return block;
            const candidates = getCandidateMoves();
            let best = -1, bestScore = -Infinity;
            for (let m of candidates) {
                const score = evaluatePosition(m, AI);
                if (score > bestScore) { bestScore = score; best = m; }
            }
            return best !== -1 ? best : getRandomMove();
        }

        function getHardMove() {
            const candidates = getCandidateMoves();
            if (candidates.length === 0) return -1;
            const depth = Math.min(4, Math.max(2, Math.floor(1000 / candidates.length)));
            let best = -1, bestScore = -Infinity;
            for (let m of candidates) {
                board[m] = AI;
                const score = -negamax(depth - 1, -Infinity, Infinity, PLAYER);
                board[m] = EMPTY;
                if (score > bestScore) { bestScore = score; best = m; }
            }
            return best !== -1 ? best : getRandomMove();
        }

        function evaluatePosition(index, player) {
            const MAX = 1000000;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            let score = 0;
            for (let dir of dirs) {
                let count = 1;
                let openEnds = 0;
                for (let d = 1; d < 5; d++) {
                    const ni = index + d*(dir[0]*BOARD_SIZE+dir[1]);
                    if (ni < 0 || ni >= BOARD_SIZE*BOARD_SIZE) break;
                    if (board[ni] === player) count++; else if (board[ni] === EMPTY) { openEnds++; break; } else break;
                }
                for (let d = 1; d < 5; d++) {
                    const ni = index - d*(dir[0]*BOARD_SIZE+dir[1]);
                    if (ni < 0 || ni >= BOARD_SIZE*BOARD_SIZE) break;
                    if (board[ni] === player) count++; else if (board[ni] === EMPTY) { openEnds++; break; } else break;
                }
                if (count >= 5) return MAX;
                if (count === 4 && openEnds === 2) score += 50000;
                else if (count === 4 && openEnds === 1) score += 10000;
                else if (count === 3 && openEnds === 2) score += 2000;
                else if (count === 3 && openEnds === 1) score += 200;
                else if (count === 2 && openEnds === 2) score += 100;
                else score += count * count;
            }
            return score;
        }

        function getCandidateMoves() {
            const set = new Set();
            for (let i = 0; i < board.length; i++) {
                if (board[i] !== EMPTY) {
                    const r = Math.floor(i / BOARD_SIZE);
                    const c = i % BOARD_SIZE;
                    for (let dr = -2; dr <= 2; dr++) {
                        for (let dc = -2; dc <= 2; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
                            const idx = nr * BOARD_SIZE + nc;
                            if (board[idx] === EMPTY) set.add(idx);
                        }
                    }
                }
            }
            if (set.size === 0) return [Math.floor(BOARD_SIZE * BOARD_SIZE / 2)];
            return Array.from(set);
        }

        function negamax(depth, alpha, beta, player) {
            if (checkWin(PLAYER)) return -100000;
            if (checkWin(AI)) return 100000;
            if (depth === 0) {
                let s = 0;
                for (let i=0;i<board.length;i++) if (board[i]===AI) s += evaluatePosition(i, AI);
                for (let i=0;i<board.length;i++) if (board[i]===PLAYER) s -= evaluatePosition(i, PLAYER);
                return s;
            }
            const moves = getCandidateMoves();
            if (moves.length === 0) return 0;
            const scored = moves.map(m => { board[m] = player; const v = evaluatePosition(m, player); board[m] = EMPTY; return {m, v}; });
            scored.sort((a,b)=>b.v - a.v);
            let max = -Infinity;
            for (let item of scored) {
                const m = item.m;
                board[m] = player;
                const val = -negamax(depth-1, -beta, -alpha, player===AI?PLAYER:AI);
                board[m] = EMPTY;
                if (val > max) max = val;
                if (val > alpha) alpha = val;
                if (alpha >= beta) break;
            }
            return max;
        }

        function isValid(index, dir) {
            if (index < 0 || index >= BOARD_SIZE * BOARD_SIZE) return false;
            const row = Math.floor(index / BOARD_SIZE);
            const col = index % BOARD_SIZE;
            if (col === 0 && dir[1] === -1) return false;
            if (col === BOARD_SIZE - 1 && dir[1] === 1) return false;
            if (row === 0 && dir[0] === -1) return false;
            if (row === BOARD_SIZE - 1 && dir[0] === 1) return false;
            return true;
        }

        function findWinningMove(player) {
            for (let i = 0; i < board.length; i++) {
                if (board[i] === EMPTY) {
                    board[i] = player;
                    if (checkWin(player)) {
                        board[i] = EMPTY;
                        return i;
                    }
                    board[i] = EMPTY;
                }
            }
            return null;
        }

        function findBlockingMove(player) {
            return findWinningMove(player);
        }

        function checkWin(player) {
            const directions = [
                [0, 1], [1, 0], [1, 1], [1, -1]
            ];

            for (let i = 0; i < board.length; i++) {
                if (board[i] !== player) continue;

                for (let dir of directions) {
                    let count = 1;
                    for (let j = 1; j < 5; j++) {
                        const newIdx = i + j * (dir[0] * BOARD_SIZE + dir[1]);
                        if (!isValidLine(newIdx, i, dir)) break;
                        if (board[newIdx] === player) count++;
                        else break;
                    }

                    for (let j = 1; j < 5; j++) {
                        const newIdx = i - j * (dir[0] * BOARD_SIZE + dir[1]);
                        if (!isValidLine(newIdx, i, [-dir[0], -dir[1]])) break;
                        if (board[newIdx] === player) count++;
                        else break;
                    }

                    if (count >= 5) return true;
                }
            }
            return false;
        }

        function isValidLine(newIdx, origIdx, dir) {
            if (newIdx < 0 || newIdx >= BOARD_SIZE * BOARD_SIZE) return false;
            const origRow = Math.floor(origIdx / BOARD_SIZE);
            const origCol = origIdx % BOARD_SIZE;
            const newRow = Math.floor(newIdx / BOARD_SIZE);
            const newCol = newIdx % BOARD_SIZE;

            if (dir[0] === 0 && dir[1] !== 0) {
                return newRow === origRow;
            }
            if (dir[1] === 0 && dir[0] !== 0) {
                return newCol === origCol;
            }
            return Math.abs(newRow - origRow) === Math.abs(newCol - origCol);
        }

        function undoMove() {
            if (moveHistory.length < 2) return;
            moveHistory.pop();
            moveHistory.pop();

            board = Array(BOARD_SIZE * BOARD_SIZE).fill(EMPTY);
            for (let move of moveHistory) {
                board[move.index] = move.player;
            }

            gameOver = false;
            updateUI();
            renderBoard();
            clearMessage();
        }

        function updateUI() {
            const blackCount = board.filter(cell => cell === PLAYER).length;
            const whiteCount = board.filter(cell => cell === AI).length;
            document.getElementById('blackCount').textContent = blackCount;
            document.getElementById('whiteCount').textContent = whiteCount;

            if (!gameOver) {
                document.getElementById('status').textContent = moveHistory.length % 2 === 0 ? '你的回合' : 'AI 正在思考...';
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        function clearMessage() {
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }

        resetGame();

        // 註冊 Service Worker 以支持 PWA 功能
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(registration => console.log('Service Worker 已註冊'))
                .catch(error => console.log('Service Worker 註冊失敗:', error));
        }

        // 安裝提示
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 可以在這裡顯示安裝按鈕
            console.log('可以安裝應用程序');
        });

        // 安裝成功
        window.addEventListener('appinstalled', () => {
            console.log('應用程序已安裝');
        });
    </script>
    <style>
        #debugPanel {
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: 320px;
            max-height: 40vh;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            border-radius: 8px;
            overflow: auto;
            z-index: 99999;
            box-shadow: 0 6px 18px rgba(0,0,0,0.5);
        }
        #debugPanel .dbgHeader{font-weight:bold;margin-bottom:6px}
        #debugPanel pre{white-space:pre-wrap;margin:0}
    </style>
    <div id="debugPanel" aria-hidden="false">
        <div class="dbgHeader">Debug</div>
        <pre id="debugLog">(debug panel)</pre>
    </div>
    <script>
    (function(){
        try{
            const pre = document.getElementById('debugLog');
            function append(msg){
                if(!pre) return;
                pre.textContent += '\n' + msg;
                if(pre.textContent.length>20000) pre.textContent = pre.textContent.slice(-10000);
                pre.parentElement.scrollTop = pre.parentElement.scrollHeight;
            }
            const orig = {log: console.log.bind(console), error: console.error.bind(console), warn: console.warn.bind(console)};
            ['log','error','warn'].forEach(fn=>{
                console[fn] = function(...args){
                    try{ append(fn+': '+args.map(a=>{try{return typeof a==='object'?JSON.stringify(a):String(a)}catch(e){return String(a)}}).join(' ')); }catch(e){}
                    orig[fn](...args);
                };
            });
            window.addEventListener('error', e=>{
                append('ERROR: '+(e.message||e)+' at '+(e.filename||'')+':'+(e.lineno||''));
            });
            window.addEventListener('unhandledrejection', e=>{
                append('PromiseReject: '+(e.reason && e.reason.message? e.reason.message : String(e.reason)));
            });
            window.__mobileDebug = function(s){ append(String(s)); };
            console.log('Mobile debug panel enabled');
        }catch(e){/* silent */}
    })();
    </script>
</body>
